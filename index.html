<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Spotter — On-device AI workout coach</title>
<style>
  :root{--bg:#0B0D0E;--surface:#141819;--ink:#EAEEEF;--muted:#8E999D;--teal:#00C9D6;--hairline:rgba(150,165,170,.16)}
  @media (prefers-color-scheme: light){:root{--bg:#F1F4F4;--surface:#FFFFFF;--ink:#161B1D;--muted:#5C6669;--teal:#008E9B;--hairline:rgba(20,45,50,.14)}}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto,"Helvetica Neue",sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased}
  main{max-width:680px;margin:0 auto;padding:72px 22px 80px;text-align:center}
  .icon{width:96px;height:96px;border-radius:22px;margin:0 auto 22px;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 42%,#2A3237 0%,#171C1F 62%,#101416 100%);box-shadow:inset 0 0 0 1px rgba(255,255,255,.06)}
  .icon::before{content:"";position:absolute;inset:16%;border-radius:50%;background:radial-gradient(circle at 38% 32%,#3A444A,#20262A 70%);box-shadow:inset 0 0 0 2px rgba(255,255,255,.07),0 4px 14px rgba(0,0,0,.5)}
  .icon::after{content:"";position:absolute;left:50%;top:50%;width:24%;height:24%;transform:translate(-50%,-50%);border-radius:50%;background:#00C9D6;box-shadow:0 0 18px rgba(0,201,214,.55)}
  h1{font-size:36px;letter-spacing:-.025em;margin:0 0 6px}
  .sub{color:var(--muted);font-size:18px;margin:0 0 30px}
  p{font-size:16px;color:var(--muted);max-width:52ch;margin:0 auto 34px}
  .links{display:flex;gap:14px;justify-content:center;flex-wrap:wrap}
  .links a{color:var(--teal);text-decoration:none;border:1px solid var(--hairline);border-radius:999px;padding:9px 20px;font-weight:600;font-size:14.5px}
  footer{margin-top:64px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<main>
  <div class="icon" role="img" aria-label="Spotter icon"></div>
  <h1>Spotter</h1>
  <p class="sub">On-device AI workout coach</p>
  <p>A weekly training plan with a coach built in — running entirely on your iPhone with Apple Intelligence. Private by architecture: no servers, no accounts with us, no tracking.</p>
  <div class="links">
    <a href="./privacy.html">Privacy Policy</a>
    <a href="./support.html">Support</a>
  </div>
  <footer>© 2026 JLJC</footer>
</main>
</body>
</html>
